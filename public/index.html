<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can Çağlar Bad - Hair Artist</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #ffffff; --bg-subtle: #f5f5f5; --text: #1a1a1a; --text-muted: #666;
            --text-dim: #aaa; --accent: #b08d57; --accent-light: #d4b37a;
            --accent-alpha: rgba(176,141,87,0.2); --accent-ring: rgba(176,141,87,0.4);
            --card-shadow: rgba(0,0,0,0.3);
            --divider: #e0e0e0;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh; overflow-x: hidden;
        }

        /* ─── HEADER ─── */
        header { text-align: center; padding: 60px 20px 20px; }
        header h1 {
            font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 400;
            letter-spacing: 0.15em; color: var(--accent); transition: color 0.5s;
        }
        header p {
            font-size: 0.9rem; letter-spacing: 0.3em; text-transform: uppercase;
            color: var(--text-muted); margin-top: 8px;
        }
        .subtitle {
            text-align: center; font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1.1rem; color: var(--text-muted); margin-bottom: 20px;
        }

        /* ─── GALLERY ITEM ─── */
        .gallery-item {
            display: flex; max-width: 1100px; margin: 0 auto 50px;
            padding: 0 30px; gap: 40px; align-items: flex-start;
        }
        .gallery-item .gallery-img {
            flex-shrink: 0; width: 420px; border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: transform 0.3s ease;
        }
        .gallery-item .gallery-img:hover { transform: translateY(-4px); }
        .gallery-item .gallery-img img { width: 100%; display: block; border-radius: 8px; }
        .gallery-item .gallery-text {
            flex: 1; padding-top: 20px;
        }
        .gallery-item .gallery-text h3 {
            font-family: 'Playfair Display', serif; font-size: 1.6rem;
            font-weight: 400; color: var(--accent); margin-bottom: 8px;
        }
        .gallery-item .gallery-text .gallery-subtitle {
            font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
            color: var(--text-dim); margin-bottom: 20px;
        }
        .gallery-item .gallery-text .gallery-line {
            margin-bottom: 14px; padding-left: 16px;
            border-left: 2px solid var(--accent-alpha);
        }
        .gallery-item .gallery-text .gallery-line .line-label {
            font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--accent); margin-bottom: 3px;
        }
        .gallery-item .gallery-text .gallery-line .line-text {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1rem; line-height: 1.6; color: var(--text-muted);
        }

        /* ─── VIDEO OVERLAY ─── */
        .gallery-img { position: relative; }
        .gallery-video {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0; transition: opacity 0.5s ease;
            border-radius: 8px;
        }
        .gallery-img:hover .gallery-video.ready { opacity: 1; }
        .video-hint {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0,0,0,0.55); color: #fff;
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; pointer-events: none;
            transition: opacity 0.3s;
        }
        .gallery-img:hover .video-hint { opacity: 0; }

        /* Lightbox / Gallery Carousel */
        .lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 10000; display: none; align-items: center; justify-content: center;
        }
        .lightbox.open { display: flex; }
        .lightbox .lb-close {
            position: absolute; top: 20px; right: 25px; color: #fff; font-size: 1.5rem;
            cursor: pointer; background: none; border: none; z-index: 2;
        }
        .lightbox .lb-content {
            max-width: 90vw; max-height: 90vh; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .lightbox .lb-content img, .lightbox .lb-content video {
            max-width: 90vw; max-height: 85vh; border-radius: 8px; display: block;
        }
        .lightbox .lb-content video { background: #000; }
        .lb-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.12); border: none; color: #fff;
            width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; z-index: 2;
        }
        .lb-arrow:hover { background: rgba(255,255,255,0.25); }
        .lb-arrow.lb-prev { left: 15px; }
        .lb-arrow.lb-next { right: 15px; }
        .lb-counter {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.6); font-size: 0.8rem; letter-spacing: 0.1em;
            z-index: 2;
        }
        .lb-arrow.hidden { display: none; }
        .lb-counter.hidden { display: none; }

        .divider {
            text-align: center; padding: 40px 0; color: var(--divider);
            font-size: 1.5rem; letter-spacing: 0.5em;
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center; padding: 100px 20px; color: var(--text-dim);
        }
        .empty-state .empty-icon { font-size: 3rem; margin-bottom: 15px; }
        .empty-state a { color: var(--accent); }

        footer {
            text-align: center; padding: 60px 20px; color: var(--divider); font-size: 0.75rem;
        }
    </style>
</head>
<body>

<!-- Lightbox / Gallery Carousel -->
<div class="lightbox" id="lightbox">
    <button class="lb-close" onclick="closeLightbox()">&#10005;</button>
    <button class="lb-arrow lb-prev" onclick="lbNav(-1)">&#10094;</button>
    <div class="lb-content" id="lbContent"></div>
    <button class="lb-arrow lb-next" onclick="lbNav(1)">&#10095;</button>
    <div class="lb-counter" id="lbCounter"></div>
</div>

<header>
    <h1>CAN ÇAĞLAR BAD</h1>
    <p>Hair Artist &middot; Istanbul</p>
</header>
<p class="subtitle">"Ruhunu saçına işle"</p>

<!-- Dynamic content -->
<div id="content"></div>

<footer>
    <p>Can Çağlar Bad &middot; Hair Artist &middot; Istanbul</p>
</footer>

<script>
// Gallery Lightbox
let lbSlides = [];
let lbIndex = 0;

function openLightbox(slides, startIndex) {
    lbSlides = slides;
    lbIndex = startIndex || 0;
    document.getElementById('lightbox').classList.add('open');
    lbRender();
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    // Pause any playing video
    const vid = document.querySelector('#lbContent video');
    if (vid) vid.pause();
    lbSlides = [];
}

function lbNav(dir) {
    const vid = document.querySelector('#lbContent video');
    if (vid) vid.pause();
    lbIndex = (lbIndex + dir + lbSlides.length) % lbSlides.length;
    lbRender();
}

function lbRender() {
    const content = document.getElementById('lbContent');
    const slide = lbSlides[lbIndex];
    if (slide.type === 'video') {
        content.innerHTML = `<video src="${esc(slide.url)}" controls autoplay style="max-width:90vw;max-height:85vh;border-radius:8px;background:#000"></video>`;
    } else {
        content.innerHTML = `<img src="${esc(slide.url)}" alt="">`;
    }
    // Arrows visibility
    const prev = document.querySelector('.lb-prev');
    const next = document.querySelector('.lb-next');
    const counter = document.getElementById('lbCounter');
    if (lbSlides.length <= 1) {
        prev.classList.add('hidden');
        next.classList.add('hidden');
        counter.classList.add('hidden');
    } else {
        prev.classList.remove('hidden');
        next.classList.remove('hidden');
        counter.classList.remove('hidden');
        counter.textContent = `${lbIndex + 1} / ${lbSlides.length}`;
    }
}

// Close on backdrop click
document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLightbox();
});

document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
});

// ─── LOAD & RENDER ───
async function loadPortfolio() {
    let items = [];
    try {
        const res = await fetch('/api/portfolio');
        items = await res.json();
    } catch(e) {}

    const gallery = items.filter(it => it.image);

    if (!gallery.length) {
        document.getElementById('content').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">&#10022;</div>
                <p>Henüz içerik yok.</p>
            </div>`;
        return;
    }

    let html = '';

    gallery.forEach((item, i) => {
        // Build slides: main image first, then gallery items
        const slides = [{ url: item.image, type: 'image' }];
        if (item.gallery && item.gallery.length) {
            item.gallery.forEach(g => slides.push({ url: g.url, type: g.type }));
        }
        const slidesJson = esc(JSON.stringify(slides));

        const hasText = item.title || item.subtitle || (item.storyLines && item.storyLines.length);
        const pos = item.position || 'left';
        html += `<div class="gallery-item" style="${pos === 'right' ? 'flex-direction:row-reverse' : ''}">`;
        if (item.video) {
            html += `<div class="gallery-img" data-has-video data-slides="${slidesJson}">
                <img src="${esc(item.image)}" alt="${esc(item.title)}">
                <video class="gallery-video" src="${esc(item.video)}" muted loop playsinline preload="metadata"></video>
                <div class="video-hint">&#9654;</div>
            </div>`;
        } else {
            html += `<div class="gallery-img" data-slides="${slidesJson}">
                <img src="${esc(item.image)}" alt="${esc(item.title)}">
            </div>`;
        }
        if (hasText) {
            html += `<div class="gallery-text">`;
            if (item.title) html += `<h3>${esc(item.title)}</h3>`;
            if (item.subtitle) html += `<div class="gallery-subtitle">${esc(item.subtitle)}</div>`;
            (item.storyLines || []).forEach(line => {
                if (line.text) {
                    html += `<div class="gallery-line">`;
                    if (line.label) html += `<div class="line-label">${esc(line.label)}</div>`;
                    html += `<div class="line-text">${esc(line.text)}</div>`;
                    html += `</div>`;
                }
            });
            html += `</div>`;
        }
        html += `</div>`;
        if (i < gallery.length - 1) html += `<div class="divider">&middot; &middot; &middot;</div>`;
    });

    document.getElementById('content').innerHTML = html;
    initVideos();
    initGalleryClicks();
}

function initVideos() {
    document.querySelectorAll('.gallery-img[data-has-video]').forEach(el => {
        const video = el.querySelector('.gallery-video');
        if (!video) return;
        video.addEventListener('loadeddata', () => video.classList.add('ready'));
        el.addEventListener('mouseenter', () => {
            video.currentTime = 0;
            video.play().catch(() => {});
        });
        el.addEventListener('mouseleave', () => video.pause());
    });
}

function initGalleryClicks() {
    document.querySelectorAll('.gallery-img[data-slides]').forEach(el => {
        el.addEventListener('click', () => {
            try {
                const slides = JSON.parse(el.dataset.slides);
                openLightbox(slides, 0);
            } catch {}
        });
    });
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ─── START ───
loadPortfolio();
</script>
</body>
</html>
